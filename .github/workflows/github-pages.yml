name: github-pages

on:
  schedule:
    - cron: '0 8 * * 0'  # Sunday 08:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/star-history.py
      - scripts/coverage-history.py
      - .github/workflows/github-pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  coverage-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - name: Install Python dependencies
        run: pip install matplotlib

      - name: Download coverage CSV from Pages
        run: |
          mkdir -p build
          curl --fail --silent --location \
            https://hangxie.github.io/parquet-tools/coverage.csv \
            --output build/coverage.csv \
          || git show 586436f:scripts/coverage.csv > build/coverage.csv

      - name: Generate coverage pages
        run: make pages-coverage

      - name: Include coverage CSV in Pages artifact
        run: cp build/coverage.csv build/pages/coverage.csv

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-pages
          path: build/pages/

  star-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install matplotlib

      - name: Generate star history page
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make pages-star

      - uses: actions/upload-artifact@v4
        with:
          name: star-pages
          path: build/pages/

  deploy:
    needs: [coverage-history, star-history]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*-pages'
          path: dist/
          merge-multiple: true

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist/

      - id: deployment
        uses: actions/deploy-pages@v4
